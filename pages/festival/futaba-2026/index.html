<script type="module">
    var games = document.getElementById("games")

    var a = [
        "ひとやしきの魔女",
        "もこたたき::NEO!",
        "The Noisy Days!",
        "世界が滅ばない理由。",
        "風呂無し、屋根無し、地獄行き。",
        "Illuminate Beat",
    ]

    loadData().then(() => {
        games.innerHTML = ""

        const works = Object.values(workData).flat(1)

        a.forEach((title) => {
            const game = works.find((work) => work.title === title)

            const button = createButton(game)
            games.appendChild(button)
        })
    })
</script>
